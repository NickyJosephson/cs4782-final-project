<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Cold Diffusion — Poster (Print)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  /* Same root tokens as the source so the rendered poster matches exactly */
  :root {
    --paper: #fafaf7;
    --paper-2: #f3f2ec;
    --ink: #1a1a1a;
    --ink-2: #4a4a4a;
    --ink-3: #8a8a85;
    --rule: #c9c9c2;
    --accent: oklch(0.72 0.09 230);
    --accent-soft: oklch(0.93 0.04 230);
    --warn: oklch(0.72 0.12 30);
    --hand: 'IBM Plex Sans', sans-serif;
    --hand-bold: 'Space Grotesk', sans-serif;
    --hand-tight: 'Space Grotesk', sans-serif;
    --mono: 'IBM Plex Mono', monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--paper); color: var(--ink); font-family: var(--hand); }

  /* Replicated primitives from source ------------------------------------- */
  .poster {
    width: 1800px; height: 1200px;
    background: var(--paper);
    position: relative;
    overflow: hidden;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(0,0,0,0.012) 0, transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(0,0,0,0.012) 0, transparent 40%);
  }
  .poster > * { position: relative; z-index: 2; }

  .hand { font-family: var(--hand); }
  .hand-bold { font-family: var(--hand-bold); }
  .hand-tight { font-family: var(--hand-tight); }
  .mono { font-family: var(--mono); }

  .box {
    border: 2px solid var(--ink);
    background: var(--paper);
    border-radius: 3px;
    padding: 14px 16px;
  }
  .box.dashed { border-style: dashed; border-color: var(--ink-2); }
  .box.thin { border-width: 1px; }
  .box.fill { background: var(--paper-2); }
  .box.accent { border-color: var(--accent); background: var(--accent-soft); }

  .label { font-family: var(--hand-bold); font-size: 22px; letter-spacing: 0.5px; color: var(--ink); }
  .label-sm { font-family: var(--hand-bold); font-size: 16px; letter-spacing: 0.5px; color: var(--ink-2); }
  .scribble { font-family: var(--hand); font-size: 18px; line-height: 1.35; color: var(--ink-2); }
  .scribble.dim { color: var(--ink-3); }
  .tag {
    display: inline-block;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    background: var(--ink); color: var(--paper);
    padding: 3px 8px; border-radius: 2px;
  }
  .tag.accent { background: var(--accent); color: #0a1a25; }
  .tag.warn { background: var(--warn); color: #2a0c00; }
  .tag.outline { background: transparent; color: var(--ink); border: 1px solid var(--ink); }

  .ph {
    background: repeating-linear-gradient(45deg, var(--paper-2), var(--paper-2) 6px, var(--paper) 6px, var(--paper) 12px);
    border: 1.5px solid var(--ink-2);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-2);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    text-align: center;
  }
  .ph.dark { background: repeating-linear-gradient(45deg, #2a2a28, #2a2a28 6px, #3a3a37 6px, #3a3a37 12px); color: #c0c0b8; border-color: #1a1a1a; }
  .ph.cold { background: repeating-linear-gradient(45deg, var(--accent-soft), var(--accent-soft) 6px, var(--paper) 6px, var(--paper) 12px); border-color: var(--accent); color: oklch(0.4 0.09 230); }

  .flake { display: inline-block; font-family: var(--hand-bold); color: var(--accent); }

  .sect {
    display: flex; align-items: baseline; gap: 10px;
    border-bottom: 2px solid var(--ink);
    padding-bottom: 4px;
    margin-bottom: 12px;
  }
  .sect .num { font-family: var(--hand-bold); font-size: 26px; color: var(--accent); line-height: 1; }
  .sect .ttl { font-family: var(--hand-bold); font-size: 26px; color: var(--ink); line-height: 1; letter-spacing: 0.5px; }
  .sect .hint { font-family: var(--mono); font-size: 10px; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.1em; margin-left: auto; }

  ul.hand-list { list-style: none; margin: 6px 0 0; padding: 0; }
  ul.hand-list li {
    font-family: var(--hand);
    font-size: 18px;
    line-height: 1.4;
    color: var(--ink-2);
    padding-left: 22px;
    position: relative;
    margin-bottom: 4px;
  }
  ul.hand-list li::before {
    content: "→";
    position: absolute; left: 0; top: 0;
    font-family: var(--hand-bold);
    color: var(--accent);
  }
  ul.hand-list li.warn::before { color: var(--warn); content: "✱"; }

  .arrow { font-family: var(--hand-bold); color: var(--accent); }

  /* Print-only stage: position the 1800x1200 poster centered on the page; print sizing handled below */
  .print-stage {
    width: 1800px;
    height: 1200px;
    margin: 0 auto;
    background: var(--paper);
  }

  /* Print rules: 36in x 24in landscape, no margin, exact colors */
  @page {
    size: 36in 24in;
    margin: 0;
  }
  @media print {
    html, body { background: var(--paper); }
    .print-stage {
      /* Each source pixel = 1/50in. 1800px @ 50dpi = 36in. */
      width: 36in;
      height: 24in;
      margin: 0;
      page-break-inside: avoid;
      break-inside: avoid;
    }
    /* Scale the inner 1800x1200px poster to fill the 36x24in page exactly */
    .poster {
      transform: scale(calc(36in / 1800px));
      transform-origin: top left;
    }
    /* Force backgrounds + colors to print */
    * {
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
    }
  }
</style>
</head>
<body>
  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <div id="root"></div>

  <!-- Load the same component sources used in the source file. We only mount VariantB1. -->
  <script type="text/babel" src="poster-variants.jsx"></script>
  <script type="text/babel" src="poster-creative.jsx"></script>

  <script type="text/babel" data-presets="env,react">
    (function () {
      const { useEffect } = React;
      function PrintApp() {
        // Apply the same accent/paper tokens as the default source view
        useEffect(() => {
          document.documentElement.style.setProperty('--paper', '#fafaf7');
          document.documentElement.style.setProperty('--paper-2', '#f3f2ec');
          document.documentElement.style.setProperty('--accent', 'oklch(0.72 0.09 230)');
          document.documentElement.style.setProperty('--accent-soft', 'oklch(0.93 0.04 230)');
        }, []);
        // Render B1 inside the .poster container at native 1800x1200
        return (
          <div className="print-stage">
            <div className="poster">
              <window.VariantB1 />
            </div>
          </div>
        );
      }

      function bootAndPrint() {
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PrintApp />);

        // Wait for fonts + a render tick + a small grace period before triggering print
        const fontsReady = document.fonts && document.fonts.ready
          ? document.fonts.ready
          : Promise.resolve();
        Promise.all([fontsReady, new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)))])
          .then(() => new Promise(r => setTimeout(r, 800)))
          .then(() => { window.print(); });
      }

      // Wait for VariantB1 to be exposed on window by poster-creative.jsx
      function waitForB1() {
        if (window.VariantB1) return bootAndPrint();
        setTimeout(waitForB1, 50);
      }
      waitForB1();
    })();
  </script>
</body>
</html>

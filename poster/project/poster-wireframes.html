<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Cold Diffusion — Poster Wireframes</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --paper: #fafaf7;
    --paper-2: #f3f2ec;
    --ink: #1a1a1a;
    --ink-2: #4a4a4a;
    --ink-3: #8a8a85;
    --rule: #c9c9c2;
    --accent: oklch(0.72 0.09 230); /* cold blue */
    --accent-soft: oklch(0.93 0.04 230);
    --warn: oklch(0.72 0.12 30); /* warm orange for "hot" callouts */
    --hand: 'IBM Plex Sans', sans-serif;
    --hand-bold: 'Space Grotesk', sans-serif;
    --hand-tight: 'Space Grotesk', sans-serif;
    --mono: 'IBM Plex Mono', monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #2a2a28; color: var(--ink); font-family: var(--hand); }

  /* ---------- Top chrome ---------- */
  .chrome {
    position: sticky; top: 0; z-index: 50;
    background: #1f1f1d; color: #f3f2ec;
    border-bottom: 1px solid #000;
    padding: 14px 24px 12px;
    display: flex; align-items: center; gap: 18px; flex-wrap: wrap;
  }
  .chrome h1 {
    margin: 0;
    font-family: var(--hand-bold);
    font-size: 18px; letter-spacing: 0.5px;
  }
  .chrome .sub {
    font-family: var(--mono);
    font-size: 11px; color: #b8b8b0;
  }
  .tabs { display: flex; gap: 6px; margin-left: auto; }
  .tab {
    font-family: var(--hand-bold);
    font-size: 13px;
    background: #2a2a28; color: #d0d0c8;
    border: 1px solid #444; border-radius: 6px;
    padding: 7px 14px; cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .tab:hover { background: #3a3a37; color: #fff; }
  .tab.active { background: var(--accent); color: #0a1a25; border-color: var(--accent); }

  /* ---------- Stage ---------- */
  .stage {
    padding: 32px 24px 80px;
    display: flex; justify-content: center;
  }
  .poster-shell {
    background: #ddd;
    padding: 18px;
    border-radius: 4px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 6px 20px rgba(0,0,0,0.3);
  }
  .poster-meta {
    font-family: var(--mono);
    font-size: 10px;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin: 0 4px 10px;
    display: flex; justify-content: space-between;
  }

  /* The poster itself: 36" x 24" @ 50 DPI = 1800x1200; scaled down to fit on screen */
  .poster {
    width: 1800px; height: 1200px;
    background: var(--paper);
    position: relative;
    overflow: hidden;
    transform-origin: top center;
    /* subtle paper texture */
    background-image:
      radial-gradient(circle at 20% 30%, rgba(0,0,0,0.012) 0, transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(0,0,0,0.012) 0, transparent 40%);
  }
  .poster.with-grid::before {
    content: "";
    position: absolute; inset: 0;
    background-image:
      linear-gradient(to right, rgba(0,0,0,0.04) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(0,0,0,0.04) 1px, transparent 1px);
    background-size: 25px 25px; /* 0.5" grid */
    pointer-events: none;
    z-index: 0;
  }
  .poster.with-margin::after {
    content: "";
    position: absolute; inset: 25px; /* 0.5" safe margin */
    border: 1px dashed rgba(0,0,0,0.18);
    pointer-events: none;
    z-index: 1;
  }

  /* All poster content sits above grid/margin */
  .poster > * { position: relative; z-index: 2; }

  /* ---------- Wireframe primitives ---------- */
  .hand { font-family: var(--hand); }
  .hand-bold { font-family: var(--hand-bold); }
  .hand-tight { font-family: var(--hand-tight); }
  .mono { font-family: var(--mono); }

  .box {
    border: 2px solid var(--ink);
    background: var(--paper);
    border-radius: 3px;
    padding: 14px 16px;
  }
  .box.dashed { border-style: dashed; border-color: var(--ink-2); }
  .box.thin { border-width: 1px; }
  .box.fill { background: var(--paper-2); }
  .box.accent { border-color: var(--accent); background: var(--accent-soft); }

  /* Slight rotation so things feel hand-placed but readable */
  .tilt-l { transform: rotate(-0.4deg); }
  .tilt-r { transform: rotate(0.4deg); }

  .label {
    font-family: var(--hand-bold);
    font-size: 22px;
    letter-spacing: 0.5px;
    color: var(--ink);
  }
  .label-sm {
    font-family: var(--hand-bold);
    font-size: 16px;
    letter-spacing: 0.5px;
    color: var(--ink-2);
  }
  .scribble {
    font-family: var(--hand);
    font-size: 18px;
    line-height: 1.35;
    color: var(--ink-2);
  }
  .scribble.dim { color: var(--ink-3); }
  .tag {
    display: inline-block;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    background: var(--ink); color: var(--paper);
    padding: 3px 8px; border-radius: 2px;
  }
  .tag.accent { background: var(--accent); color: #0a1a25; }
  .tag.warn { background: var(--warn); color: #2a0c00; }
  .tag.outline { background: transparent; color: var(--ink); border: 1px solid var(--ink); }

  /* Image placeholder */
  .ph {
    background:
      repeating-linear-gradient(45deg, var(--paper-2), var(--paper-2) 6px, var(--paper) 6px, var(--paper) 12px);
    border: 1.5px solid var(--ink-2);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-2);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    text-align: center;
  }
  .ph.dark { background: repeating-linear-gradient(45deg, #2a2a28, #2a2a28 6px, #3a3a37 6px, #3a3a37 12px); color: #c0c0b8; border-color: #1a1a1a; }
  .ph.cold { background: repeating-linear-gradient(45deg, var(--accent-soft), var(--accent-soft) 6px, var(--paper) 6px, var(--paper) 12px); border-color: var(--accent); color: oklch(0.4 0.09 230); }

  /* Snowflake glyph */
  .flake {
    display: inline-block;
    font-family: var(--hand-bold);
    color: var(--accent);
  }

  /* Section header bar */
  .sect {
    display: flex; align-items: baseline; gap: 10px;
    border-bottom: 2px solid var(--ink);
    padding-bottom: 4px;
    margin-bottom: 12px;
  }
  .sect .num {
    font-family: var(--hand-bold);
    font-size: 26px;
    color: var(--accent);
    line-height: 1;
  }
  .sect .ttl {
    font-family: var(--hand-bold);
    font-size: 26px;
    color: var(--ink);
    line-height: 1;
    letter-spacing: 0.5px;
  }
  .sect .hint {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--ink-3);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-left: auto;
  }

  /* Bullet (hand-drawn) */
  ul.hand-list { list-style: none; margin: 6px 0 0; padding: 0; }
  ul.hand-list li {
    font-family: var(--hand);
    font-size: 18px;
    line-height: 1.4;
    color: var(--ink-2);
    padding-left: 22px;
    position: relative;
    margin-bottom: 4px;
  }
  ul.hand-list li::before {
    content: "→";
    position: absolute; left: 0; top: 0;
    font-family: var(--hand-bold);
    color: var(--accent);
  }
  ul.hand-list li.warn::before { color: var(--warn); content: "✱"; }

  /* Doodle arrows */
  .arrow {
    font-family: var(--hand-bold);
    color: var(--accent);
  }

  /* ---------- Variant containers (each is a full poster) ---------- */
  .variant { display: none; }
  .variant.active { display: block; }

  /* ===== Variant A: Classic 3-column ===== */
  .vA-grid {
    position: absolute;
    inset: 50px 50px 50px 50px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    grid-template-rows: auto auto 1fr auto;
    gap: 22px;
  }
  .vA-title { grid-column: 1 / -1; }
  .vA-banner {
    background: var(--ink);
    color: var(--paper);
    padding: 22px 28px;
    border-radius: 4px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 20px;
    align-items: center;
  }
  .vA-banner h1 {
    margin: 0; font-family: var(--hand-bold); font-size: 64px; line-height: 1; letter-spacing: 0.5px;
  }
  .vA-banner h1 .accent-word { color: var(--accent); }
  .vA-banner .authors {
    font-family: var(--hand); font-size: 17px; color: #d0d0c8; line-height: 1.3;
  }
  .vA-banner .authors strong { color: var(--paper); font-weight: 700; }
  .vA-banner .crest {
    font-family: var(--hand-bold); font-size: 14px; color: var(--accent);
    text-align: right;
  }

  /* ===== Variant B: Hero-driven ===== */
  .vB-grid {
    position: absolute;
    inset: 50px 50px 50px 50px;
    display: grid;
    grid-template-columns: 360px 1fr 360px;
    grid-template-rows: auto 1fr auto;
    gap: 20px;
  }
  .vB-title { grid-column: 1 / -1; }

  /* ===== Variant C: Pipeline-forward ===== */
  .vC-grid {
    position: absolute;
    inset: 50px 50px 50px 50px;
    display: grid;
    grid-template-rows: auto auto 1fr;
    gap: 20px;
  }

  /* ===== Variant D: Asymmetric magazine ===== */
  .vD-grid {
    position: absolute;
    inset: 0;
    display: grid;
    grid-template-columns: 540px 1fr;
  }
  .vD-rail {
    background: var(--ink);
    color: var(--paper);
    padding: 50px 40px;
    display: flex; flex-direction: column; gap: 28px;
  }
  .vD-rail h1 {
    margin: 0;
    font-family: var(--hand-bold);
    font-size: 72px; line-height: 0.95;
    letter-spacing: 0.5px;
  }
  .vD-rail h1 .accent-word { color: var(--accent); }
  .vD-rail .authors { font-family: var(--hand); font-size: 18px; color: #c8c8c0; line-height: 1.4; }
  .vD-main {
    padding: 50px 50px 50px 40px;
    display: grid;
    grid-template-rows: auto 1fr auto;
    gap: 22px;
  }

  /* ---------- Tweaks panel hosted below ---------- */
  /* (we use the tweaks_panel starter) */
</style>
</head>
<body>

  <!-- React + Babel -->

  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

  <div id="root"></div>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="poster-variants.jsx"></script>

</body>
